              "on-background": "#d4e6e5",

              background: "#061616",

              "error-container": "#93000a",

  <body
    class="bg-surface min-h-screen flex flex-col font-body-md text-on-surface"
    data-alt="majestic misty mountains of northern vietnam at dawn with soft teal and cyan atmospheric light reflecting on a calm water surface"
  >
    <!--Background-->
    <div class="fixed inset-0 z-0">
      <img
        class="w-full h-full object-cover desaturate-[0.2]"
        data-alt="Breathtaking Vietnamese landscape with misty limestone mountains rising from calm turquoise waters at dawn, cinematic atmosphere with ethereal fog"
        src="https://lh3.googleusercontent.com/aida-public/AB6AXuDNHtpjGsTIcDJLAe9Q6GgL5DkByVexE4sZMfTmcQsZdoB9onzeCCHFF4ijBkDlM-XT6raLwMVxO4oye7AJOxeKeJpJ8PJ6GbTjevoQy2JCvkXs_maQhgsrbbX-J979FYnj57rEmaBnZyWk78HGrKX1pvlKz49lAFxcn4-4c3fYGlN1_UjuDh8LeCtsl7R60_fpamHNT8mLQr5_x7WvxMcInRGowVsZqaKwSnX3lh3XoFH_OnhJLVMLY5zhezRd6-CCC8q5OMVPWO4"
      />
      <div class="absolute inset-0 bg-surface/40 backdrop-blur-[2px]"></div>
    </div>
    <!-- Top AppBar (from Shared Components) -->
    <header
      class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 py-4 bg-transparent border-b border-white/10"
    >
      <div class="flex items-center gap-4">
        <span
          class="material-symbols-outlined text-teal-600 dark:text-teal-400 cursor-pointer p-2 hover:bg-white/10 transition-colors rounded-full"
          data-icon="menu"
          >menu</span
        >
        <span
          class="font-['Noto_Serif'] font-bold text-2xl text-teal-900 dark:text-teal-50"
          >Cờ Tướng Từ Thiện</span
        >
      </div>
      <div class="flex items-center gap-6">
        <button
          class="font-['Noto_Serif'] text-lg tracking-wide text-teal-900/60 dark:text-teal-100/60 hover:bg-white/10 transition-colors px-3 py-1 rounded"
        >
          Tiếng Việt
        </button>
      </div>
    </header>
    <main class="flex-grow flex items-center justify-center px-4 py-20">
      <!-- Authentication Card -->
      <div
        class="glass-container w-full max-w-[480px] rounded-xl overflow-hidden shadow-2xl border border-white/10 flex flex-col relative"
      >
        <!-- Decorative Wood Trim -->
        <div class="wood-trim h-1 w-full opacity-80"></div>
        <div class="p-container-padding">
          <div class="text-center mb-section-margin">
            <h1 class="font-headline-lg text-headline-lg text-on-surface mb-2">
              Chào mừng trở lại
            </h1>
            <p class="font-body-md text-body-md text-on-surface-variant">
              Hành trình cờ tướng bắt đầu từ đây
            </p>
          </div>
          <form id="loginForm" class="space-y-input-gap">
            <!-- Email Field -->
            <div class="space-y-2">
              <label
                class="font-label-sm text-label-sm text-on-surface-variant block ml-1"
                >Email hoặc Tên đăng nhập</label
              >
              <div class="relative group">
                <input
                  id="username"
                  name="username"
                  class="input-glass w-full px-4 py-4 rounded-lg border-b-2 border-outline/30 border-t-transparent border-x-transparent focus:border-tertiary focus:ring-0 focus:outline-none transition-all duration-300 text-on-surface placeholder:text-on-surface-variant/40"
                  placeholder="username hoặc email"
                  type="text"
                  required
                />
              </div>
            </div>
            <!-- Password Field -->
            <div class="space-y-2">
              <label
                class="font-label-sm text-label-sm text-on-surface-variant block ml-1"
                >Mật khẩu</label
              >
              <div class="relative group">
                <input
                  id="password"
                  name="password"
                  class="input-glass w-full px-4 py-4 rounded-lg border-b-2 border-outline/30 border-t-transparent border-x-transparent focus:border-tertiary focus:ring-0 focus:outline-none transition-all duration-300 text-on-surface placeholder:text-on-surface-variant/40"
                  placeholder="••••••••"
                  type="password"
                  required
                />
              </div>
            </div>
            <!-- Options Row -->
            <div class="flex items-center justify-between mt-4">
              <label class="flex items-center cursor-pointer group">
                <div class="relative flex items-center">
                  <input
                    id="remember"
                    class="peer h-5 w-5 rounded border-2 border-outline/50 bg-transparent text-tertiary focus:ring-offset-0 focus:ring-0 transition-all"
                    type="checkbox"
                  />
                  <span
                    class="material-symbols-outlined absolute opacity-0 peer-checked:opacity-100 text-on-tertiary pointer-events-none text-sm font-bold"
                    data-icon="check"
                    data-weight="fill"
                    >check</span
                  >
                </div>
                <span
                  class="ml-3 font-label-sm text-label-sm text-on-surface-variant group-hover:text-on-surface transition-colors"
                  >Ghi nhớ tôi</span
                >
              </label>
              <a
                class="font-label-sm text-label-sm text-primary hover:text-tertiary transition-colors"
                href="#"
                >Quên mật khẩu?</a
              >
            </div>
            <!-- Error Message -->
            <div
              id="errorMessage"
              class="hidden mt-4 p-3 rounded-lg bg-error-container text-error border border-error/50 text-sm"
            ></div>
            <!-- Success Message -->
            <div
              id="successMessage"
              class="hidden mt-4 p-3 rounded-lg bg-green-900/30 text-green-300 border border-green-500/50 text-sm"
            ></div>
            <!-- Main Button -->
            <button
              id="loginBtn"
              class="warm-wood-btn w-full py-4 mt-8 rounded-lg font-button-text text-button-text text-on-tertiary uppercase tracking-widest transition-all duration-300 hover:opacity-90"
              type="submit"
            >
              <span id="loginBtnText">Đăng Nhập</span>
            </button>
          </form>
          <!-- Social Login Separator -->
          <div class="relative my-8 flex items-center">
            <div class="flex-grow border-t border-outline/20"></div>
            <span
              class="px-4 font-headline-md text-sm text-on-surface-variant italic"
              >hoặc</span
            >
            <div class="flex-grow border-t border-outline/20"></div>
          </div>
          <!-- Secondary Link -->
          <div class="text-center">
            <p class="font-body-md text-body-md text-on-surface-variant">
              Chưa có tài khoản?
              <a
                class="text-primary font-semibold hover:underline decoration-primary/30 underline-offset-4 ml-1"
                href="register.html"
                >Đăng ký ngay</a
              >
            </p>
          </div>
        </div>
        <!-- Bottom Decorative Wood Trim -->
        <div class="wood-trim h-1 w-full opacity-40 mt-auto"></div>
      </div>
    </main>
    <!-- Footer (from Shared Components) -->
    <footer
      class="fixed bottom-0 w-full flex flex-col md:flex-row justify-between items-center px-8 py-6 backdrop-blur-sm bg-transparent border-t border-white/10"
    >
      <div
        class="font-['Noto_Serif'] text-xs uppercase tracking-widest text-teal-900/40 dark:text-teal-100/40 mb-4 md:mb-0"
      >
        © 2026 Cờ Tướng Từ Thiện. Tất cả quyền được bảo lưu.
      </div>
      <div class="flex gap-8">
        <a
          class="font-['Noto_Serif'] text-xs uppercase tracking-widest text-teal-900/40 dark:text-teal-100/40 hover:text-teal-600 dark:hover:text-teal-400 transition-all duration-300"
          href="#"
          >Điều khoản</a
        >
        <a
          class="font-['Noto_Serif'] text-xs uppercase tracking-widest text-teal-900/40 dark:text-teal-100/40 hover:text-teal-600 dark:hover:text-teal-400 transition-all duration-300"
          href="#"
          >Bảo mật</a
        >
        <a
          class="font-['Noto_Serif'] text-xs uppercase tracking-widest text-teal-900/40 dark:text-teal-100/40 hover:text-teal-600 dark:hover:text-teal-400 transition-all duration-300"
          href="#"
          >Liên hệ</a
        >
      </div>
    </footer>

    <style>
      .spinner {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 3px solid rgba(238, 189, 142, 0.3);
        border-top: 3px solid #eebd8e;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>

    <script>
      const API_URL = "http://localhost:3000/api";

      document
        .getElementById("loginForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const username = document.getElementById("username").value;
          const password = document.getElementById("password").value;
          const loginBtn = document.getElementById("loginBtn");
          const loginBtnText = document.getElementById("loginBtnText");
          const errorMessage = document.getElementById("errorMessage");
          const successMessage = document.getElementById("successMessage");

          errorMessage.classList.add("hidden");
          successMessage.classList.add("hidden");

          loginBtn.disabled = true;
          loginBtnText.innerHTML =
            '<span class="spinner"></span> Đang xử lý...';

          try {
            const response = await fetch(`${API_URL}/auth/login`, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({ username, password }),
            });

            const data = await response.json();

            if (!response.ok) {
              throw new Error(data.message || "Đăng nhập thất bại");
            }

            // Save token to localStorage
            localStorage.setItem("token", data.token);
            localStorage.setItem("user", JSON.stringify(data.user));

            successMessage.textContent =
              "Đăng nhập thành công! Đang chuyển hướng...";
            successMessage.classList.remove("hidden");

            // Redirect to dashboard
            setTimeout(() => {
              window.location.href = "dashboard.html";
            }, 1500);
          } catch (error) {
            errorMessage.textContent = error.message;
            errorMessage.classList.remove("hidden");
          } finally {
            loginBtn.disabled = false;
            loginBtnText.textContent = "Đăng Nhập";
          }
        });
    </script>
  </body>
</html>
