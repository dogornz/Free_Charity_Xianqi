<!doctype html>
<html lang="vn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Cờ Tướng Từ Thiện</title>
  </head>
  <body>
    <div class="promote-container">
      <a id="btn-playnow" href="dashboard.html"></a>
    </div>

    <script>
      // Ngăn zoom Ctrl + scroll
      document.addEventListener(
        "wheel",
        function (e) {
          if (e.ctrlKey) {
            e.preventDefault();
          }
        },
        { passive: false },
      );

      // Ngăn zoom Ctrl ++, Ctrl --, Ctrl 0
      document.addEventListener("keydown", function (e) {
        if (e.ctrlKey && (e.key === "+" || e.key === "-" || e.key === "0")) {
          e.preventDefault();
        }
      });
    </script>
  </body>
</html>
