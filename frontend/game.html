<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=0.8, maximum-scale=0.8, user-scalable=no"
    />
    <title>Cờ Tướng - Trò Chơi Cờ Tướng Online</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      /* Đặt zoom mặc định 80% cho toàn trang */
      html {
        zoom: 0.8;
        -moz-transform: scale(0.8);
        -moz-transform-origin: 0 0;
      }
    </style>
    <script>
      // Chặn Ctrl+Scroll (zoom bằng chuột)
      document.addEventListener(
        "wheel",
        function (e) {
          if (e.ctrlKey) {
            e.preventDefault();
          }
        },
        { passive: false },
      );

      // Chặn Ctrl+Plus, Ctrl+Minus, Ctrl+0
      document.addEventListener("keydown", function (e) {
        if (
          e.ctrlKey &&
          (e.key === "+" ||
            e.key === "-" ||
            e.key === "=" ||
            e.key === "_" ||
            e.key === "0" ||
            e.keyCode === 187 ||
            e.keyCode === 189 ||
            e.keyCode === 48)
        ) {
          e.preventDefault();
        }
      });

      // Chặn pinch-to-zoom trên touch device
      document.addEventListener(
        "touchmove",
        function (e) {
          if (e.touches.length > 1) {
            e.preventDefault();
          }
        },
        { passive: false },
      );

      document.addEventListener("gesturestart", function (e) {
        e.preventDefault();
      });
      document.addEventListener("gesturechange", function (e) {
        e.preventDefault();
      });
      document.addEventListener("gestureend", function (e) {
        e.preventDefault();
      });
    </script>
  </head>
  <body>
    <!-- Background Audio for moves -->
    <audio id="move-sound" preload="auto" autoplay loop muted>
      <source src="../audio/play-music.mp3" type="audio/mpeg" />
    </audio>

    <div class="game-container">
      <!-- LEFT SECTION -->
      <div class="left-section">
        <!-- OPPONENT -->
        <div class="player-info opponent-info">
          <div class="player-header">
            <img
              src="../assets/avatar-default.png"
              alt="Đối thủ"
              class="avatar"
            />
            <div class="player-details">
              <h3 class="player-name" id="opponent-name">Đối Thủ</h3>
              <div class="player-status">
                <span id="opponent-piece">Quân đang chơi: Đen</span>
                <span id="opponent-time">5:00</span>
              </div>
            </div>
          </div>
        </div>

        <!-- PLAYER -->
        <div class="player-info player-info-bottom">
          <div class="player-header">
            <img
              src="../assets/avatar-default.png"
              alt="Người chơi"
              class="avatar"
            />
            <div class="player-details">
              <h3 class="player-name" id="player-name">Bạn</h3>
              <div class="player-status">
                <span id="player-piece">Quân đang chơi: Đỏ</span>
                <span id="player-time">5:00</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- CENTER SECTION - CHESS BOARD -->
      <div class="center-section">
        <div class="board-container">
          <div class="board" id="chess-board">
            <!-- Bàn cờ sẽ được tạo bởi JavaScript -->
          </div>
        </div>
        <!-- CAPTURED PIECES -->
        <div class="captured-pieces-container">
          <div class="captured-pieces opponent-captured">
            <div class="captured-title">Đối thủ ăn được:</div>
            <div class="pieces-grid" id="opponent-captured-pieces"></div>
          </div>
          <div class="captured-pieces player-captured">
            <div class="captured-title">Bạn ăn được:</div>
            <div class="pieces-grid" id="player-captured-pieces"></div>
          </div>
        </div>
      </div>

      <!-- RIGHT SECTION -->
      <div class="right-section">
        <!-- TOP BUTTONS -->
        <div class="top-buttons">
          <button
            class="icon-button settings-btn"
            id="settings-btn"
            title="Cài đặt"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.4"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="4.5" />
              <path
                d="M12,1 L13.8,4.2 L17.2,2.8 L19.2,5.8 L22.2,6.8 L21,10.2 L23,12
             L21,13.8 L22.2,17.2 L19.2,18.2 L17.2,21.2 L13.8,19.8 L12,23
             L10.2,19.8 L6.8,21.2 L4.8,18.2 L1.8,17.2 L3,13.8 L1,12
             L3,10.2 L1.8,6.8 L4.8,5.8 L6.8,2.8 L10.2,4.2 Z"
              />
            </svg>
          </button>
          <button class="icon-button sound-btn" id="sound-btn" title="Âm thanh">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polygon
                points="1,8 8,5 8,19 1,16"
                fill="currentColor"
                stroke="none"
              />
              <rect
                x="0"
                y="9"
                width="1.5"
                height="6"
                rx="0.8"
                fill="currentColor"
                stroke="none"
              />
              <path d="M11,7 Q16,12 11,17" />
              <path d="M15,3.5 Q22,12 15,20.5" />
            </svg>
          </button>
          <button
            class="icon-button surrender-btn"
            id="surrender-btn"
            title="Nâng đầu hàng"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <rect x="2" y="1" width="3" height="22" rx="1.5" fill="#8b6914" />
              <path
                d="M5,1 Q11,4.5 21,1 Q19,8 21,14 Q11,10.5 5,14 Z"
                fill="#cc0000"
              />
            </svg>
          </button>
        </div>

        <!-- MOVE HISTORY -->
        <div class="move-history">
          <div class="move-history-header">
            <h4>Lịch Sử Nước Đi</h4>
          </div>
          <div class="moves-list" id="moves-list"></div>
        </div>

        <!-- CHAT BOX -->
        <div class="chat-box">
          <div class="chat-header">
            <h4>Chat</h4>
          </div>
          <div class="messages" id="chat-messages">
            <div class="message opponent-message">
              <span class="message-sender">Đối Thủ:</span>
              <span class="message-text">Chào bạn!</span>
            </div>
            <div class="message player-message">
              <span class="message-sender">Bạn:</span>
              <span class="message-text">Chào! Hãy chơi thôi!</span>
            </div>
          </div>
          <div class="chat-input">
            <input type="text" id="chat-input" placeholder="Gửi tin nhắn..." />
            <button id="send-btn" class="send-btn">Gửi</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal hidden" id="settings-modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Cài Đặt</h2>
          <button class="close-btn" id="close-settings">&times;</button>
        </div>
        <div class="modal-body">
          <div class="settings-option">
            <label>
              <input type="checkbox" id="sound-toggle" checked />
              Bật Âm Thanh
            </label>
          </div>
          <div class="settings-option">
            <label>Âm lượng:</label>
            <input
              type="range"
              id="volume-slider"
              min="0"
              max="100"
              value="50"
            />
            <span id="volume-value">50%</span>
          </div>
          <div class="settings-option">
            <label>Độ sáng:</label>
            <input
              type="range"
              id="brightness-slider"
              min="50"
              max="150"
              value="100"
            />
          </div>
        </div>
      </div>
    </div>

    <!-- Surrender Confirmation Modal -->
    <div class="modal hidden" id="surrender-modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Phất Cờ Đầu Hàng</h2>
        </div>
        <div class="modal-body">
          <p>Bạn có chắc chắn muốn nâng đầu hàng không?</p>
        </div>
        <div class="modal-footer">
          <button class="modal-btn cancel-btn" id="cancel-surrender">
            Hủy
          </button>
          <button class="modal-btn confirm-btn" id="confirm-surrender">
            Xác Nhận
          </button>
        </div>
      </div>
    </div>
    <script src="../backend/game.js"></script>
  </body>
</html>
