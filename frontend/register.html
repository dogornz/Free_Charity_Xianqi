<!doctype html>

<html class="dark" lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <title>Đăng Kí - Cờ Tướng Từ Thiện</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;500;600;700&amp;family=Be+Vietnam+Pro:wght@400;500;600&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      .glass-container {
        background: rgba(18, 34, 34, 0.4);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
      .input-glass {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }
      .wood-accent {
        background: linear-gradient(to bottom, #eebd8e, #61401b);
      }
      .ink-stroke-check:checked {
        background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3e%3cpath d='M12.207 4.793a1 1 0 010 1.414l-5 5a1 1 0 01-1.414 0l-2-2a1 1 0 011.414-1.414L6.5 9.086l4.293-4.293a1 1 0 011.414 0z'/%3e%3c/svg%3e");
      }
    </style>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              outline: "#8a9292",
              "on-secondary": "#0f3638",
              "surface-container-low": "#0e1e1e",
              "surface-dim": "#061616",
              "secondary-fixed-dim": "#a8cdd0",
              "surface-container-lowest": "#021111",
              "surface-container": "#122222",
              surface: "#061616",
              "on-secondary-container": "#9abfc2",
              "on-tertiary": "#472a06",
              "on-primary-fixed-variant": "#1b4e4f",
              "on-error": "#690005",
              "on-secondary-fixed": "#002022",
              "tertiary-fixed-dim": "#eebd8e",
              "surface-tint": "#9ecfd0",
              "primary-container": "#1a4d4e",
              "on-error-container": "#ffdad6",
              "surface-variant": "#283837",
              "surface-bright": "#2c3c3c",
              "on-background": "#d4e6e5",
              "inverse-surface": "#d4e6e5",
              "on-surface": "#d4e6e5",
              "inverse-primary": "#366667",
              secondary: "#a8cdd0",
              "on-surface-variant": "#c0c8c8",
              "inverse-on-surface": "#233333",
              "surface-container-high": "#1d2d2c",
              "on-primary": "#003738",
              "on-tertiary-fixed": "#2c1600",
              "on-primary-container": "#8cbdbd",
              "on-primary-fixed": "#002020",
              "secondary-fixed": "#c3eaed",
              "primary-fixed": "#baecec",
              primary: "#9ecfd0",
              "tertiary-container": "#603f1a",
              "on-secondary-fixed-variant": "#284c4f",
              "outline-variant": "#404848",
              background: "#061616",
              error: "#ffb4ab",
              "surface-container-highest": "#283837",
              "error-container": "#93000a",
              "on-tertiary-container": "#daab7d",
              tertiary: "#eebd8e",
              "primary-fixed-dim": "#9ecfd0",
              "tertiary-fixed": "#ffdcbd",
              "on-tertiary-fixed-variant": "#61401b",
              "secondary-container": "#2b4f52",
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
            spacing: {
              "container-padding": "40px",
              gutter: "24px",
              unit: "8px",
              "input-gap": "20px",
              "section-margin": "32px",
            },
            fontFamily: {
              "button-text": ["Be Vietnam Pro"],
              "label-sm": ["Be Vietnam Pro"],
              "headline-md": ["Noto Serif"],
              "headline-lg": ["Noto Serif"],
              "body-md": ["Be Vietnam Pro"],
              "body-lg": ["Be Vietnam Pro"],
            },
            fontSize: {
              "button-text": [
                "16px",
                { lineHeight: "1", letterSpacing: "0.02em", fontWeight: "600" },
              ],
              "label-sm": [
                "14px",
                {
                  lineHeight: "1.2",
                  letterSpacing: "0.05em",
                  fontWeight: "500",
                },
              ],
              "headline-md": ["24px", { lineHeight: "1.3", fontWeight: "500" }],
              "headline-lg": [
                "32px",
                {
                  lineHeight: "1.2",
                  letterSpacing: "-0.02em",
                  fontWeight: "600",
                },
              ],
              "body-md": ["16px", { lineHeight: "1.5", fontWeight: "400" }],
              "body-lg": ["18px", { lineHeight: "1.6", fontWeight: "400" }],
            },
          },
        },
      };
    </script>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body
    class="bg-surface text-on-surface font-body-md min-h-screen flex items-center justify-center overflow-x-hidden relative"
  >
    <!-- Background Landscape -->
    <div class="fixed inset-0 z-0">
      <img
        class="w-full h-full object-cover desaturate-[0.2]"
        data-alt="Breathtaking Vietnamese landscape with misty limestone mountains rising from calm turquoise waters at dawn, cinematic atmosphere with ethereal fog"
        src="https://lh3.googleusercontent.com/aida-public/AB6AXuDNHtpjGsTIcDJLAe9Q6GgL5DkByVexE4sZMfTmcQsZdoB9onzeCCHFF4ijBkDlM-XT6raLwMVxO4oye7AJOxeKeJpJ8PJ6GbTjevoQy2JCvkXs_maQhgsrbbX-J979FYnj57rEmaBnZyWk78HGrKX1pvlKz49lAFxcn4-4c3fYGlN1_UjuDh8LeCtsl7R60_fpamHNT8mLQr5_x7WvxMcInRGowVsZqaKwSnX3lh3XoFH_OnhJLVMLY5zhezRd6-CCC8q5OMVPWO4"
      />
      <div class="absolute inset-0 bg-surface/40 backdrop-blur-[2px]"></div>
    </div>
    <!-- Top Navigation Bar (Shared Component) -->
    <header
      class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 py-4 bg-transparent border-b border-white/10"
    >
      <div class="flex items-center gap-4">
        <span class="material-symbols-outlined text-teal-600 dark:text-teal-400"
          >menu</span
        >
        <span
          class="font-['Noto_Serif'] font-bold text-2xl text-teal-900 dark:text-teal-50"
          >Cờ Tướng Từ Thiện</span
        >
      </div>
      <button
        class="font-['Noto_Serif'] text-lg tracking-wide text-teal-900/60 dark:text-teal-100/60 hover:bg-white/10 transition-colors px-3 py-1 rounded"
      >
        Tiếng Việt
      </button>
    </header>
    <!-- Main Signup Card Container -->
    <main class="relative z-10 w-full max-w-[480px] px-6 py-12">
      <div
        class="glass-container rounded-xl overflow-hidden border border-white/10 shadow-2xl relative"
      >
        <!-- Wood Accent Trim (Top) -->
        <div class="h-1 w-full wood-accent"></div>
        <div class="p-container-padding">
          <!-- Card Header -->
          <div class="text-center mb-section-margin">
            <h1 class="font-headline-lg text-headline-lg text-primary mb-2">
              Tạo tài khoản
            </h1>
            <p class="font-body-md text-on-surface-variant">
              Khám phá vẻ đẹp di sản Việt Nam
            </p>
          </div>
          <!-- Registration Form -->
          <form id="registerForm" class="space-y-input-gap">
            <!-- Full Name -->
            <div class="group">
              <label
                class="block font-label-sm text-label-sm text-on-surface-variant mb-2"
                for="fullname"
                >Họ và Tên</label
              >
              <div class="relative">
                <input
                  class="w-full input-glass border-0 border-b-2 border-outline/30 focus:border-tertiary focus:ring-0 text-on-surface placeholder:text-outline/50 transition-all duration-300 py-3 px-1"
                  id="fullname"
                  name="fullname"
                  placeholder="Nguyễn Văn A"
                  type="text"
                  required
                />
                <span
                  class="material-symbols-outlined absolute right-2 top-3 text-outline/40 text-sm"
                  >person</span
                >
              </div>
            </div>
            <!-- Username -->
            <div class="group">
              <label
                class="block font-label-sm text-label-sm text-on-surface-variant mb-2"
                for="username"
                >Tên đăng nhập</label
              >
              <div class="relative">
                <input
                  class="w-full input-glass border-0 border-b-2 border-outline/30 focus:border-tertiary focus:ring-0 text-on-surface placeholder:text-outline/50 transition-all duration-300 py-3 px-1"
                  id="username"
                  name="username"
                  placeholder="nguyenvan_a"
                  type="text"
                  required
                />
                <span
                  class="material-symbols-outlined absolute right-2 top-3 text-outline/40 text-sm"
                  >alternate_email</span
                >
              </div>
            </div>
            <!-- Email -->
            <div class="group">
              <label
                class="block font-label-sm text-label-sm text-on-surface-variant mb-2"
                for="email"
                >Email</label
              >
              <div class="relative">
                <input
                  class="w-full input-glass border-0 border-b-2 border-outline/30 focus:border-tertiary focus:ring-0 text-on-surface placeholder:text-outline/50 transition-all duration-300 py-3 px-1"
                  id="email"
                  name="email"
                  placeholder="email@example.com"
                  type="email"
                  required
                />
                <span
                  class="material-symbols-outlined absolute right-2 top-3 text-outline/40 text-sm"
                  >mail</span
                >
              </div>
            </div>
            <!-- Password -->
            <div class="group">
              <label
                class="block font-label-sm text-label-sm text-on-surface-variant mb-2"
                for="password"
                >Mật khẩu (tối thiểu 6 ký tự)</label
              >
              <div class="relative">
                <input
                  class="w-full input-glass border-0 border-b-2 border-outline/30 focus:border-tertiary focus:ring-0 text-on-surface placeholder:text-outline/50 transition-all duration-300 py-3 px-1 pr-10"
                  id="password"
                  name="password"
                  placeholder="••••••••"
                  type="password"
                  minlength="6"
                  required
                />
                <button
                  id="togglePassword"
                  class="material-symbols-outlined absolute right-2 top-3 text-outline/40 hover:text-outline/80 transition-colors text-sm cursor-pointer"
                  type="button"
                  title="Hiển thị/Ẩn mật khẩu"
                >
                  visibility
                </button>
              </div>
            </div>
            <!-- Confirm Password -->
            <div class="group">
              <label
                class="block font-label-sm text-label-sm text-on-surface-variant mb-2"
                for="confirm_password"
                >Xác nhận mật khẩu</label
              >
              <div class="relative">
                <input
                  class="w-full input-glass border-0 border-b-2 border-outline/30 focus:border-tertiary focus:ring-0 text-on-surface placeholder:text-outline/50 transition-all duration-300 py-3 px-1 pr-10"
                  id="confirm_password"
                  name="confirm_password"
                  placeholder="••••••••"
                  type="password"
                  required
                />
                <button
                  id="toggleConfirmPassword"
                  class="material-symbols-outlined absolute right-2 top-3 text-outline/40 hover:text-outline/80 transition-colors text-sm cursor-pointer"
                  type="button"
                  title="Hiển thị/Ẩn mật khẩu"
                >
                  visibility
                </button>
              </div>
            </div>
            <!-- Error Message -->
            <div
              id="errorMessage"
              class="hidden p-3 rounded-lg bg-error-container text-error border border-error/50 text-sm"
            ></div>

            <!-- Terms & Conditions -->
            <div class="flex items-start gap-3 mt-4">
              <div class="pt-1">
                <input
                  class="w-4 h-4 rounded-sm bg-transparent border-outline/50 text-tertiary focus:ring-0 focus:ring-offset-0 ink-stroke-check"
                  id="terms"
                  type="checkbox"
                  required
                />
              </div>
              <label
                class="font-label-sm text-label-sm text-on-surface-variant leading-tight"
                for="terms"
              >
                Tôi đồng ý với các
                <a class="text-tertiary hover:underline" href="#"
                  >Điều khoản dịch vụ</a
                >
                và
                <a class="text-tertiary hover:underline" href="#"
                  >Chính sách bảo mật</a
                >.
              </label>
            </div>
            <!-- Submit Button -->
            <div class="pt-4">
              <button
                id="registerBtn"
                class="w-full wood-accent text-on-tertiary font-button-text text-button-text py-4 rounded shadow-lg hover:shadow-tertiary/20 active:opacity-80 transition-all duration-300 flex items-center justify-center gap-2"
                type="submit"
              >
                <span id="registerBtnText">Đăng Ký</span>
                <span class="material-symbols-outlined text-sm"
                  >arrow_forward</span
                >
              </button>
            </div>
          </form>
          <!-- Divider -->
          <div class="flex items-center gap-4 my-8">
            <div class="h-px flex-1 bg-outline/20"></div>
            <span class="font-headline-md text-sm text-outline/60 italic"
              >hoặc</span
            >
            <div class="h-px flex-1 bg-outline/20"></div>
          </div>
          <!-- Footer Link -->
          <div class="text-center">
            <p class="font-body-md text-on-surface-variant">
              Đã có tài khoản?
              <a
                class="text-primary font-semibold hover:underline ml-1"
                href="login.html"
                >Đăng nhập</a
              >
            </p>
          </div>
        </div>
        <!-- Wood Accent Trim (Bottom Decorative) -->
        <div class="absolute bottom-0 left-0 w-full h-1 bg-tertiary/10"></div>
      </div>
    </main>
    <!-- Footer (Shared Component) -->
    <footer
      class="fixed bottom-0 w-full flex flex-col md:flex-row justify-between items-center px-8 py-6 backdrop-blur-sm border-t border-white/10 z-50"
    >
      <p
        class="font-['Noto_Serif'] text-xs uppercase tracking-widest text-teal-900/40 dark:text-teal-100/40 mb-4 md:mb-0"
      >
        © 2026 Cờ Tướng Từ Thiện. Tất cả quyền được bảo lưu.
      </p>
      <nav class="flex gap-8">
        <a
          class="font-['Noto_Serif'] text-xs uppercase tracking-widest text-teal-900/40 dark:text-teal-100/40 hover:text-teal-600 dark:hover:text-teal-400 transition-all duration-300"
          href="#"
          >Điều khoản</a
        >
        <a
          class="font-['Noto_Serif'] text-xs uppercase tracking-widest text-teal-900/40 dark:text-teal-100/40 hover:text-teal-600 dark:hover:text-teal-400 transition-all duration-300"
          href="#"
          >Bảo mật</a
        >
        <a
          class="font-['Noto_Serif'] text-xs uppercase tracking-widest text-teal-900/40 dark:text-teal-100/40 hover:text-teal-600 dark:hover:text-teal-400 transition-all duration-300"
          href="#"
          >Liên hệ</a
        >
      </nav>
    </footer>

    <style>
      .spinner {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 3px solid rgba(238, 189, 142, 0.3);
        border-top: 3px solid #eebd8e;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>

    <script>
      const API_URL = "http://localhost:3000/api";

      document
        .getElementById("registerForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const fullname = document.getElementById("fullname").value;
          const username = document.getElementById("username").value;
          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;
          const confirmPassword =
            document.getElementById("confirm_password").value;
          const registerBtn = document.getElementById("registerBtn");
          const registerBtnText = document.getElementById("registerBtnText");
          const errorMessage = document.getElementById("errorMessage");

          errorMessage.classList.add("hidden");

          // Validate passwords match
          if (password !== confirmPassword) {
            errorMessage.textContent = "Mật khẩu không khớp!";
            errorMessage.classList.remove("hidden");
            return;
          }

          registerBtn.disabled = true;
          registerBtnText.innerHTML =
            '<span class="spinner"></span> Đang xử lý...';

          try {
            const response = await fetch(`${API_URL}/auth/register`, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                username,
                email,
                password,
                fullName: fullname,
              }),
            });

            const data = await response.json();

            if (!response.ok) {
              throw new Error(data.message || "Đăng ký thất bại");
            }

            errorMessage.classList.add("hidden");
            errorMessage.textContent = "";

            // Reset form
            document.getElementById("registerForm").reset();

            // Show success and redirect
            const successMsg = document.createElement("div");
            successMsg.className =
              "hidden mt-4 p-3 rounded-lg bg-green-900/30 text-green-300 border border-green-500/50 text-sm";
            successMsg.textContent = "Đăng ký thành công! Đang chuyển hướng...";
            successMsg.classList.remove("hidden");
            errorMessage.parentElement.insertBefore(
              successMsg,
              errorMessage.nextSibling,
            );

            setTimeout(() => {
              window.location.href = "login.html";
            }, 1500);
          } catch (error) {
            errorMessage.textContent = error.message;
            errorMessage.classList.remove("hidden");
          } finally {
            registerBtn.disabled = false;
            registerBtnText.innerHTML =
              'Đăng Ký <span class="material-symbols-outlined text-sm">arrow_forward</span>';
          }
        });

      // Toggle Password Visibility
      document
        .getElementById("togglePassword")
        .addEventListener("click", (e) => {
          e.preventDefault();
          const passwordInput = document.getElementById("password");
          const toggleBtn = document.getElementById("togglePassword");

          if (passwordInput.type === "password") {
            passwordInput.type = "text";
            toggleBtn.textContent = "visibility_off";
            toggleBtn.title = "Ẩn mật khẩu";
          } else {
            passwordInput.type = "password";
            toggleBtn.textContent = "visibility";
            toggleBtn.title = "Hiển thị mật khẩu";
          }
        });

      // Toggle Confirm Password Visibility
      document
        .getElementById("toggleConfirmPassword")
        .addEventListener("click", (e) => {
          e.preventDefault();
          const confirmPasswordInput =
            document.getElementById("confirm_password");
          const toggleBtn = document.getElementById("toggleConfirmPassword");

          if (confirmPasswordInput.type === "password") {
            confirmPasswordInput.type = "text";
            toggleBtn.textContent = "visibility_off";
            toggleBtn.title = "Ẩn mật khẩu";
          } else {
            confirmPasswordInput.type = "password";
            toggleBtn.textContent = "visibility";
            toggleBtn.title = "Hiển thị mật khẩu";
          }
        });
    </script>
  </body>
</html>
